<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width,initial-scale=1.0">

   <title>
      Online Examination Portal
   </title>

   <link rel="stylesheet" href="css/index.css">
</head>

<body>

   <div class="bg-animation">

      <div class="card">

         <img src="assets/logo.png" class="logo" alt="Institute Logo">

         <h1>
            Sampurna Skills & Development
         </h1>

         <h2>
            Online Examination Portal
         </h2>

         <p class="exam-name">
            AI Foundation
            Assessment Test - 2026
         </p>

         <div class="notice">

            <h3>
               Important Instructions
            </h3>

            <ul>

               <li>
                  Duration : 10 Minutes
               </li>

               <li>
                  Total Questions : 10
               </li>

               <li>
                  One attempt only.
               </li>

               <li>
                  Auto submit after time ends.
               </li>

               <li>
                  Do not refresh or switch tabs.
               </li>

            </ul>

         </div>

         <button id="startBtn">

            Proceed To Login

         </button>

      </div>

   </div>

   <script src="js/index.js"></script>

</body>

</html>
